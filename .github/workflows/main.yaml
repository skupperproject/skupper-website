on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * 0"
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: [3.x]
    runs-on: ${{matrix.os}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python-version}}
      - run: pip install pyyaml
      - run: ./plano test
        env:
          PLANO_COLOR: "1"

      - name: Install Plano
        run: |
          curl -sfL https://github.com/ssorj/plano/archive/main.tar.gz | tar -xz
          cd plano-main && make install
      - name: Install Transom
        run: |
          curl -sfL https://github.com/ssorj/transom/archive/main.tar.gz | tar -xz
          cd transom-main && ./plano install


on:
  push:
    branches: [$default-branch]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  main:
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    runs-on: ubuntu-latest
    steps:
      - name: Set up environment
        run: |
          echo "PLANO_COLOR=1" >> "$GITHUB_ENV"
          pip install build wheel
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

