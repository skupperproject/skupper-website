kind: Site
metadata:
  name: east
  namespace: hello-world-east
spec:
  defaultIssuer: &lt;your-ca&gt;
--
kind: AccessToken
metadata:
  name: west-token
  namespace: hello-world-east
spec:
  code: &lt;your-secret-code&gt;
  url: &lt;west-grant-server-url&gt;
--
kind: Connector
metadata:
  name: backend
  namespace: hello-world-east
spec:
  routingKey: backend
  selector: app=backend
  port: 8080
