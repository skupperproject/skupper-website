kind: Site
metadata:
  name: east
  namespace: hello-world-east
spec:
  defaultIssuer: your-ca

--
kind: AccessToken
metadata:
  name: west-token
  namespace: hello-world-east
spec:
  code: your-secret-code
  url: https://west.your-platform.net:9090/west-grant
--
kind: Connector
metadata:
  name: backend
  namespace: hello-world-east
spec:
  routingKey: backend
  selector: app=backend
  port: 8080
